<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5"
      markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="white" font-size="20" font-weight="700" letter-spacing="-0.5">Arquitectura AWS — ContactosCRUD</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="12">Capa Gratuita · Lambda + API Gateway + DynamoDB + S3</text>

  <!-- AWS Region border -->
  <rect x="30" y="80" width="840" height="460" rx="12" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="100" fill="#475569" font-size="11" font-weight="600">AWS Region: us-east-1</text>

  <!-- ── CLIENTE ── -->
  <g filter="url(#shadow)">
    <rect x="60" y="240" width="130" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="78" y="258" width="36" height="28" rx="6" fill="url(#blueGrad)"/>
  <!-- browser icon -->
  <rect x="80" y="260" width="32" height="24" rx="4" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="80" y1="266" x2="112" y2="266" stroke="white" stroke-width="1.5"/>
  <circle cx="84" cy="263" r="1.5" fill="white"/>
  <circle cx="89" cy="263" r="1.5" fill="white"/>
  <circle cx="94" cy="263" r="1.5" fill="white"/>
  <text x="125" y="273" fill="white" font-size="13" font-weight="600">Browser</text>
  <text x="125" y="289" fill="#94a3b8" font-size="10">Usuario Final</text>
  <text x="78" y="318" fill="#64748b" font-size="10">SPA en S3</text>
  <text x="78" y="330" fill="#64748b" font-size="10">index.html</text>

  <!-- ── S3 ── -->
  <g filter="url(#shadow)">
    <rect x="60" y="390" width="130" height="80" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="72" y="402" width="32" height="28" rx="6" fill="url(#greenGrad)"/>
  <!-- S3 icon placeholder -->
  <text x="76" y="421" fill="white" font-size="14" font-weight="800">S3</text>
  <text x="112" y="418" fill="white" font-size="12" font-weight="600">Amazon S3</text>
  <text x="112" y="432" fill="#94a3b8" font-size="10">Static Hosting</text>
  <text x="72" y="454" fill="#64748b" font-size="10">5 GB gratis · siempre</text>

  <!-- Arrow: Browser ↔ S3 -->
  <line x1="125" y1="390" x2="125" y2="345" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="130" y="370" fill="#475569" font-size="10">HTML/CSS/JS</text>

  <!-- ── API GATEWAY ── -->
  <g filter="url(#shadow)">
    <rect x="280" y="210" width="160" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="296" y="226" width="36" height="28" rx="6" fill="url(#cyanGrad)"/>
  <text x="298" y="244" fill="white" font-size="10" font-weight="700">API</text>
  <text x="340" y="241" fill="white" font-size="13" font-weight="600">API Gateway</text>
  <text x="340" y="256" fill="#94a3b8" font-size="10">REST API</text>

  <!-- Routes -->
  <rect x="294" y="266" width="134" height="18" rx="4" fill="#0f172a"/>
  <text x="300" y="279" fill="#06b6d4" font-size="10" font-family="monospace">GET  /contactos</text>
  <rect x="294" y="288" width="134" height="18" rx="4" fill="#0f172a"/>
  <text x="300" y="301" fill="#10b981" font-size="10" font-family="monospace">POST /contactos</text>
  <rect x="294" y="310" width="134" height="18" rx="4" fill="#0f172a"/>
  <text x="300" y="323" fill="#f59e0b" font-size="10" font-family="monospace">PUT  /contactos/{id}</text>
  <rect x="294" y="332" width="134" height="18" rx="4" fill="#0f172a"/>
  <text x="300" y="345" fill="#ef4444" font-size="10" font-family="monospace">DEL  /contactos/{id}</text>

  <!-- Arrow: Browser → API GW -->
  <line x1="190" y1="285" x2="278" y2="285" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="210" y="278" fill="#3b82f6" font-size="11" font-weight="600">HTTPS</text>

  <!-- ── LAMBDA ── -->
  <g filter="url(#shadow)">
    <rect x="530" y="210" width="160" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="546" y="226" width="36" height="28" rx="6" fill="url(#orangeGrad)"/>
  <text x="548" y="244" fill="white" font-size="11" font-weight="700">λ</text>
  <text x="590" y="241" fill="white" font-size="13" font-weight="600">AWS Lambda</text>
  <text x="590" y="256" fill="#94a3b8" font-size="10">Node.js 18.x</text>

  <text x="546" y="276" fill="#64748b" font-size="10">Runtime: Node.js 18</text>
  <text x="546" y="291" fill="#64748b" font-size="10">Memory: 128 MB</text>
  <text x="546" y="306" fill="#64748b" font-size="10">Timeout: 15s</text>
  <text x="546" y="321" fill="#64748b" font-size="10">SDK: @aws-sdk v3</text>
  <rect x="546" y="330" width="132" height="18" rx="4" fill="#0f172a"/>
  <text x="552" y="343" fill="#10b981" font-size="10">1M req/mes gratis</text>

  <!-- Arrow: API GW → Lambda -->
  <line x1="440" y1="285" x2="528" y2="285" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="455" y="278" fill="#64748b" font-size="10">Invoke</text>

  <!-- ── DYNAMODB ── -->
  <g filter="url(#shadow)">
    <rect x="720" y="180" width="150" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="736" y="196" width="36" height="28" rx="6" fill="url(#blueGrad)"/>
  <!-- DB icon -->
  <ellipse cx="754" cy="203" rx="14" ry="5" fill="none" stroke="white" stroke-width="1.5"/>
  <line x1="740" y1="203" x2="740" y2="214" stroke="white" stroke-width="1.5"/>
  <line x1="768" y1="203" x2="768" y2="214" stroke="white" stroke-width="1.5"/>
  <ellipse cx="754" cy="214" rx="14" ry="5" fill="none" stroke="white" stroke-width="1.5"/>

  <text x="780" y="211" fill="white" font-size="13" font-weight="600">DynamoDB</text>
  <text x="780" y="226" fill="#94a3b8" font-size="10">On-Demand</text>

  <!-- Table info -->
  <rect x="736" y="238" width="122" height="14" rx="3" fill="#3b82f6" opacity="0.2"/>
  <text x="740" y="249" fill="#93c5fd" font-size="10" font-weight="600">Tabla: Contactos</text>

  <text x="736" y="268" fill="#64748b" font-size="10">PK: contactoId (UUID)</text>
  <rect x="736" y="274" width="122" height="1" fill="#334155"/>
  <text x="736" y="286" fill="#64748b" font-size="10">GSI: email-index</text>
  <rect x="736" y="292" width="122" height="1" fill="#334155"/>

  <text x="736" y="306" fill="#94a3b8" font-size="10" font-weight="600">Atributos:</text>
  <text x="736" y="320" fill="#64748b" font-size="10">• nombre</text>
  <text x="736" y="334" fill="#64748b" font-size="10">• email</text>
  <text x="736" y="348" fill="#64748b" font-size="10">• telefono</text>
  <text x="736" y="362" fill="#64748b" font-size="10">• empresa</text>
  <text x="736" y="376" fill="#64748b" font-size="10">• creadoEn</text>

  <!-- free tier badge -->
  <rect x="736" y="384" width="122" height="18" rx="4" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <text x="742" y="397" fill="#10b981" font-size="10">25 GB + 25 WCU gratis</text>

  <!-- Arrow: Lambda → DynamoDB -->
  <line x1="690" y1="285" x2="718" y2="285" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="694" y="278" fill="#64748b" font-size="10">SDK</text>

  <!-- ── IAM Role ── -->
  <g filter="url(#shadow)">
    <rect x="530" y="410" width="160" height="80" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  </g>
  <rect x="546" y="422" width="32" height="28" rx="6" fill="#7c3aed"/>
  <text x="548" y="440" fill="white" font-size="11" font-weight="700">IAM</text>
  <text x="586" y="438" fill="white" font-size="12" font-weight="600">IAM Role</text>
  <text x="586" y="452" fill="#94a3b8" font-size="10">Mínimo privilegio</text>
  <text x="546" y="472" fill="#64748b" font-size="10">Solo permisos DynamoDB</text>

  <!-- Arrow: IAM → Lambda (dashed) -->
  <line x1="610" y1="410" x2="610" y2="372" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="614" y="395" fill="#7c3aed" font-size="10">Assume Role</text>

  <!-- Legend -->
  <rect x="60" y="502" width="780" height="50" rx="8" fill="rgba(255,255,255,0.02)" stroke="#1e293b" stroke-width="1"/>
  <text x="80" y="524" fill="#64748b" font-size="11" font-weight="600">Integrantes:</text>
  <text x="163" y="524" fill="#94a3b8" font-size="11">RIOS GONZALEZ JUAN MIGUEL</text>
  <text x="163" y="541" fill="#94a3b8" font-size="11">NIETO CARDEÑO BREYNEER · GARCIA ILIAS ALEXA TATIANA</text>
  <text x="690" y="524" fill="#3b82f6" font-size="11" font-weight="600">100% Capa Gratuita</text>
  <text x="690" y="541" fill="#64748b" font-size="10">AWS Free Tier</text>
</svg>
